<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secret Story</title>

<style>
body{
 margin:0;
 font-family:sans-serif;
 background:#111;
 color:#fff;
 text-align:center;
 overflow:auto;
}

/* ---------------- CALCULATOR ---------------- */
#calc{
 margin-top:100px;
}

#screen{
 height:50px;
 width:200px;
 background:#222;
 margin:10px auto;
 line-height:50px;
 font-size:20px;
 border-radius:10px;
}

button{
 padding:15px;
 margin:5px;
 font-size:18px;
 border:none;
 border-radius:10px;
 cursor:pointer;
}

/* ---------------- STORY ---------------- */
.hidden{ display:none; }

.slide{
 display:none;
 height:100vh;
 justify-content:center;
 align-items:center;
 font-size:24px;
}

.active{
 display:flex;
}

/* progress bar */
#progress{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:5px;
 background:#333;
}

#bar{
 height:100%;
 width:0%;
 background:#00ffcc;
}

/* ---------------- CRATE ---------------- */
.crate{
 width:120px;
 height:120px;
 background:brown;
 margin:auto;
 margin-top:20px;
 display:flex;
 justify-content:center;
 align-items:center;
 cursor:pointer;
 border-radius:10px;
}

/* ---------------- POPUP ---------------- */
.popup{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.7);
 display:none;
 justify-content:center;
 align-items:center;
}

.popup-box{
 background:#222;
 padding:20px;
 border-radius:15px;
 max-width:300px;
}
</style>
</head>

<body>

<!-- ---------------- CALCULATOR ---------------- -->
<div id="calc">
 <h2>Enter Password 🔐</h2>
 <div id="screen"></div>

 <div>
  <button onclick="press('1')">1</button>
  <button onclick="press('2')">2</button>
  <button onclick="press('3')">3</button><br>

  <button onclick="press('4')">4</button>
  <button onclick="press('5')">5</button>
  <button onclick="press('6')">6</button><br>

  <button onclick="press('7')">7</button>
  <button onclick="press('8')">8</button>
  <button onclick="press('9')">9</button><br>

  <button onclick="clearScr()">C</button>
  <button onclick="press('0')">0</button>
  <button onclick="check()">OK</button>
 </div>
</div>

<!-- ---------------- STORY ---------------- -->
<div id="story" class="hidden">

 <div id="progress"><div id="bar"></div></div>

 <div class="slide active">hey… 👀</div>
 <div class="slide">i made something for you 💛</div>
 <div class="slide">tap to continue…</div>

 <!-- SINGLE CRATE (FIXED DOUBLE ISSUE) -->
 <div class="slide">
  <button onclick="findKey(event)">find key 🔑</button>
  <div class="crate" onclick="openCrate(event)">🎁</div>
 </div>

 <div class="slide">hope you liked it :)</div>

</div>

<!-- ---------------- POPUP ---------------- -->
<div id="popup" class="popup">
 <div class="popup-box" id="popup-text"></div>
</div>

<script>
let input="";
const password="143";
let hasKey=false;

// ---------------- CALCULATOR ----------------
function press(num){
 input+=num;
 document.getElementById("screen").innerText=input;
}

function clearScr(){
 input="";
 document.getElementById("screen").innerText="";
}

function check(){
 if(input===password){
  document.getElementById("calc").style.display="none";
  document.getElementById("story").classList.remove("hidden");
 } else {
  alert("wrong password 😅");
  clearScr();
 }
}

// ---------------- SLIDES ----------------
let current=0;
const slides=document.querySelectorAll(".slide");
const bar=document.getElementById("bar");
const story=document.getElementById("story");

document.body.addEventListener("click",function(e){

 // prevent slide change when clicking buttons, crate or popup
 if(e.target.closest("button") || 
    e.target.closest(".crate") || 
    e.target.closest(".popup")) return;

 if(story.classList.contains("hidden")) return;
 if(current>=slides.length-1) return;

 slides[current].classList.remove("active");
 current++;
 slides[current].classList.add("active");

 bar.style.width=(current/(slides.length-1))*100+"%";
});

// ---------------- POPUP ----------------
function showPopup(msg){
 const popup=document.getElementById("popup");
 const text=document.getElementById("popup-text");

 text.innerHTML=msg;
 popup.style.display="flex";

 popup.onclick=()=>popup.style.display="none";
}

// ---------------- FIND KEY ----------------
function findKey(e){
 e.stopPropagation();
 hasKey=true;

 showPopup(`
 pehle ek choti si condition hai... 👀<br><br>
 agar aap smile nahi kar rahe ho... toh ek baar smile kariyega 😊<br><br>
 <b>aapki smile hi iss crate ki key hai 💛</b>
 `);
}

// ---------------- OPEN CRATE ----------------
function openCrate(e){
 e.stopPropagation();

 if(!hasKey){
  showPopup("arey… pehle key toh dhundhiye 🥺");
 } else {
  showPopup(`
  🎉 surpriseeee 🎉<br><br>
  ye aapke liye 🍰<br><br>
  virtual hai… but intention real hai :)<br><br>
  aap important ho 💛
  `);

  document.querySelector(".crate").style.display="none";
 }
}
</script>

</body>
</html>
