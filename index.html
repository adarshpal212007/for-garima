<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Surprise 💛</title>

<style>
body{
 margin:0;
 font-family:Poppins, sans-serif;
 background:linear-gradient(135deg,#ff9a9e,#fad0c4);
 overflow:hidden;
}

/* CALCULATOR */
#calc{
 height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;
 flex-direction:column;
}

.screen{
 width:200px;
 height:50px;
 background:#fff;
 border-radius:10px;
 margin-bottom:15px;
 display:flex;
 align-items:center;
 justify-content:flex-end;
 padding:10px;
 font-size:20px;
}

.buttons button{
 width:50px;
 height:50px;
 margin:5px;
 border:none;
 border-radius:10px;
 font-size:18px;
 cursor:pointer;
}

/* STORY */
#story{
 display:none;
 height:100vh;
 width:100%;
 position:relative;
 color:white;
 text-align:center;
}

.slide{
 position:absolute;
 width:100%;
 height:100%;
 display:flex;
 justify-content:center;
 align-items:center;
 font-size:1.5rem;
 opacity:0;
 transition:0.5s;
}

.slide.active{
 opacity:1;
}

/* PROGRESS BAR */
.bar{
 position:absolute;
 top:0;
 left:0;
 height:5px;
 background:white;
 width:0%;
 transition:0.3s;
}

/* FINAL SECTION */
.final-section{
 position:absolute;
 bottom:30px;
 width:100%;
 text-align:center;
 z-index:1000;
}

.crate{
 font-size:70px;
 cursor:pointer;
 transition:0.3s;
}

.crate:hover{
 transform:scale(1.2) rotate(5deg);
}

.find-btn{
 margin-top:15px;
 padding:10px 20px;
 border:none;
 background:#ff4d6d;
 color:white;
 border-radius:20px;
 cursor:pointer;
}

/* POPUP */
.popup{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.7);
 display:none;
 align-items:center;
 justify-content:center;
 z-index:2000;
}

.popup-content{
 background:white;
 color:black;
 padding:25px;
 border-radius:20px;
 max-width:300px;
 text-align:center;
}
</style>
</head>

<body>

<!-- CALCULATOR -->
<div id="calc">
<div class="screen" id="screen"></div>

<div class="buttons">
<br>
<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button><br>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button><br>

<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button><br>

<button onclick="clearScr()">C</button>
<button onclick="press('0')">0</button>
<button onclick="backspace()">⌫</button><br>

<button onclick="check()">OK</button>
</div>
</div>

<!-- STORY -->
<div id="story">
<div class="bar" id="bar"></div>

<div class="slide active">Hey… ek choti si story hai 👀</div>
<div class="slide">thodi si ajeeb… thodi si cute 😊</div>
<div class="slide">bas aapke liye 💛</div>

<!-- FINAL -->
<div class="final-section">
<div class="crate" onclick="openCrate(event)">🎁</div>
<br>
<button class="find-btn" onclick="findKey(event)">Find Key 🔑</button>
</div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-content" id="popup-text"></div>
</div>

<script>
let input="";
const password="143";
let hasKey=false;

// calculator
function press(num){
 input+=num;
 document.getElementById("screen").innerText=input;
}

function clearScr(){
 input="";
 document.getElementById("screen").innerText="";
}

function backspace(){
 input=input.slice(0,-1);
 document.getElementById("screen").innerText=input;
}

function check(){
 if(input===password){
  document.getElementById("calc").style.display="none";
  document.getElementById("story").style.display="block";
 } else {
  alert("wrong password 😅");
  clearScr();
 }
}

// slides
let current=0;
const slides=document.querySelectorAll(".slide");
const bar=document.getElementById("bar");

document.getElementById("story").addEventListener("click",function(e){

 // ignore clicks on crate or button
 if(e.target.closest(".crate") || e.target.closest(".find-btn")) return;

 if(current >= slides.length-1) return;

 slides[current].classList.remove("active");
 current++;
 slides[current].classList.add("active");

 bar.style.width=(current/(slides.length-1))*100+"%";
});

// popup
function showPopup(msg){
 const popup=document.getElementById("popup");
 const text=document.getElementById("popup-text");

 text.innerHTML=msg;
 popup.style.display="flex";
}

// close popup
document.getElementById("popup").onclick=function(){
 this.style.display="none";
};

// key
function findKey(e){
 e.stopPropagation();

 hasKey=true;

 showPopup(`
 pehle ek choti si condition hai...<br><br>
 agar aap smile nahi kar rahe ho... toh ek baar smile kariyega 😊<br><br>
 <b>aapki smile hi iss crate ki key hai 💛</b>
 `);
}

// crate
function openCrate(e){
 e.stopPropagation();

 if(!hasKey){
  showPopup("arey… pehle key toh dhundhiye 🥺");
 } else {
  showPopup(`
  🎉 surpriseeee 🎉<br><br>
  ye aapke liye 🍰<br><br>
  virtual hai… but intention real hai :)<br><br>
  aap important ho 💛
  `);

  document.querySelector(".crate").style.display="none";
 }
}
</script>

</body>
</html>
